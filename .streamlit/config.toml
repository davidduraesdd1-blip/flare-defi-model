[theme]
base = "dark"
primaryColor = "#E84142"
backgroundColor = "#0A0E1A"
secondaryBackgroundColor = "#111827"
textColor = "#E2E8F0"
font = "sans serif"

[server]
headless = true
port = 8501
enableCORS = false
enableXsrfProtection = true
# enableSerializableSessionState removed — not a valid Streamlit config key

[browser]
gatherUsageStats = false

[runner]
fastReruns = true
enforceSerializableSessionState = true
